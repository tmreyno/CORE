# Enable native CPU features for maximum performance
# This enables ARM crypto extensions on Apple Silicon and SHA-NI on x86_64

[build]
# Use native CPU features - enables ARM crypto, SHA-NI, AVX2, etc.
rustflags = ["-C", "target-cpu=native"]

# Set macOS deployment target to match current system
[env]
MACOSX_DEPLOYMENT_TARGET = "15.0"

# Windows MSVC target: LLVM/Clang for bindgen (libarchive2-sys FFI generation)
[target.x86_64-pc-windows-msvc.env]
LIBCLANG_PATH = { value = "C:\\Program Files\\LLVM\\bin", force = false }
BINDGEN_EXTRA_CLANG_ARGS = { value = "--target=x86_64-pc-windows-msvc -fms-compatibility -fms-extensions -fdelayed-template-parsing -IC:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\VC\\Tools\\MSVC\\14.44.35207\\include -IC:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\ucrt -IC:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\um -IC:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\shared", force = false }

# For Apple Silicon (M1/M2/M3), this enables:
# - NEON SIMD instructions
# - AES hardware acceleration  
# - SHA1/SHA256 hardware acceleration (ARM Cryptographic Extensions)
# - CRC32 hardware acceleration

# For Intel/AMD x86_64, this enables:
# - AVX/AVX2 SIMD instructions
# - SHA-NI (SHA Extensions) for hardware SHA1/SHA256
# - AES-NI for hardware AES
