# Enable native CPU features for maximum performance
# This enables ARM crypto extensions on Apple Silicon and SHA-NI on x86_64

[build]
# Use native CPU features - enables ARM crypto, SHA-NI, AVX2, etc.
rustflags = ["-C", "target-cpu=native"]
# Use sccache to cache compiled crates — dependencies only recompile when
# their version or features change. Survives `cargo clean`.
# Install: brew install sccache
rustc-wrapper = "sccache"

# Set macOS deployment target to match current system
[env]
MACOSX_DEPLOYMENT_TARGET = "15.0"

# NOTE: Windows-specific BINDGEN_EXTRA_CLANG_ARGS and LIBCLANG_PATH are set
# in the GitHub Actions release workflow (release.yml) as environment variables,
# not here. Cargo's config.toml [target.*.env] tables cause parse errors
# on non-target platforms.

# For Apple Silicon (M1/M2/M3), this enables:
# - NEON SIMD instructions
# - AES hardware acceleration  
# - SHA1/SHA256 hardware acceleration (ARM Cryptographic Extensions)
# - CRC32 hardware acceleration

# For Intel/AMD x86_64, this enables:
# - AVX/AVX2 SIMD instructions
# - SHA-NI (SHA Extensions) for hardware SHA1/SHA256
# - AES-NI for hardware AES
