name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag_name: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Try to extract section from CHANGELOG.md for this version
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?${VERSION}\]?/,/^## \[?[0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG} of CORE-FFX — Forensic File Explorer"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "CORE-FFX ${{ steps.get_tag.outputs.tag }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS Build (Apple Silicon + Intel Universal) ──────────────────────────
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin,x86_64-apple-darwin
          cache-workspaces: "src-tauri -> src-tauri/target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (libarchive, build tools)
        run: |
          # Check if pre-built libarchive exists
          if [ -f "patches/libarchive2-sys/prebuilt/macos-universal/libarchive.a" ]; then
            echo "✅ Pre-built libarchive.a found — skipping brew install libarchive"
            brew install pkg-config cmake
          else
            brew install libarchive pkg-config cmake
            # Make libarchive visible to pkg-config (Homebrew keg-only)
            echo "PKG_CONFIG_PATH=$(brew --prefix libarchive)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
            # Make sure linker can find libarchive
            echo "LIBRARY_PATH=$(brew --prefix libarchive)/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Set up libewf (macOS — prebuilt or from source)
        run: |
          PREBUILT="libewf-ffi/prebuilt/macos-arm64/libewf.a"
          if [ -f "$PREBUILT" ]; then
            # Use pre-built static library (built by prebuild-native-deps.yml)
            PREBUILT_DIR="$(cd libewf-ffi/prebuilt/macos-arm64 && pwd)"
            echo "LIBEWF_DIR=$PREBUILT_DIR" >> "$GITHUB_ENV"
            echo "✅ Using pre-built libewf.a ($(ls -lh "$PREBUILT" | awk '{print $5}'))"
          else
            echo "ℹ️  No pre-built libewf — building from source..."
            curl -sL "https://github.com/libyal/libewf/releases/download/20240506/libewf-experimental-20240506.tar.gz" | tar xzf -
            cd libewf-20240506

            ./configure \
              --prefix=/tmp/libewf-install \
              --enable-static \
              --disable-shared \
              --disable-nls \
              --with-openssl=no \
              --disable-openssl-evp-cipher \
              --disable-openssl-evp-md

            make -j$(sysctl -n hw.ncpu)
            make install

            echo "LIBEWF_DIR=/tmp/libewf-install/lib" >> "$GITHUB_ENV"
            echo "✅ libewf built from source ($(ls -lh /tmp/libewf-install/lib/libewf.a | awk '{print $5}'))"
          fi

      - name: Verify sevenzip-ffi library
        run: |
          if [ -f sevenzip-ffi/build/lib7z_ffi.a ]; then
            echo "✅ Pre-built lib7z_ffi.a found ($(ls -lh sevenzip-ffi/build/lib7z_ffi.a | awk '{print $5}'))"
          else
            echo "::error::lib7z_ffi.a not found at sevenzip-ffi/build/lib7z_ffi.a"
            echo "Run the 'Pre-build Native Dependencies' workflow (platform: macos) to build it"
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Write Apple API key for notarization
        run: |
          if [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "$APPLE_API_KEY_CONTENT" > "${{ runner.temp }}/AuthKey.p8"
            echo "✅ Apple notarization API key written"
          else
            echo "⚠️  APPLE_API_KEY_CONTENT secret not set — notarization will be skipped"
            echo "   The .app will trigger Gatekeeper 'damaged' warnings on download"
          fi
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - name: Align Tauri plugin versions (NPM ↔ Rust)
        run: |
          echo "Checking for Tauri plugin version mismatches..."
          # Extract Rust crate versions from Cargo.lock and align NPM packages
          for plugin in dialog updater process; do
            RUST_VER=$(grep -A1 "name = \"tauri-plugin-${plugin}\"" src-tauri/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)"/\1/')
            NPM_PKG="@tauri-apps/plugin-${plugin}"
            NPM_VER=$(node -e "try{console.log(require('./node_modules/${NPM_PKG}/package.json').version)}catch{console.log('none')}")
            if [ "$NPM_VER" = "none" ]; then
              continue
            fi
            RUST_MINOR="${RUST_VER%.*}"
            NPM_MINOR="${NPM_VER%.*}"
            if [ "$RUST_MINOR" != "$NPM_MINOR" ]; then
              echo "⚠️  Mismatch: tauri-plugin-${plugin} (Rust ${RUST_VER}) vs ${NPM_PKG} (NPM ${NPM_VER})"
              echo "   Updating NPM package to ^${RUST_VER}..."
              npm install "${NPM_PKG}@^${RUST_VER}" --save
            else
              echo "✅ ${plugin}: Rust ${RUST_VER} ↔ NPM ${NPM_VER}"
            fi
          done
          # Also align core @tauri-apps/api with tauri crate
          TAURI_RUST=$(grep -A1 'name = "tauri"' src-tauri/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_NPM=$(node -e "console.log(require('./node_modules/@tauri-apps/api/package.json').version)")
          TAURI_RUST_MINOR="${TAURI_RUST%.*}"
          TAURI_NPM_MINOR="${TAURI_NPM%.*}"
          if [ "$TAURI_RUST_MINOR" != "$TAURI_NPM_MINOR" ]; then
            echo "⚠️  Mismatch: tauri (Rust ${TAURI_RUST}) vs @tauri-apps/api (NPM ${TAURI_NPM})"
            echo "   Updating @tauri-apps/api to ^${TAURI_RUST}..."
            npm install "@tauri-apps/api@^${TAURI_RUST}" --save
          else
            echo "✅ tauri core: Rust ${TAURI_RUST} ↔ NPM ${TAURI_NPM}"
          fi

      - name: Build Tauri app (macOS)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib
          # ── Apple Code Signing (required for Gatekeeper) ──
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── Apple Notarization (required for "identified developer" trust) ──
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8

      - name: List build artifacts
        run: |
          echo "=== DMG ==="
          find src-tauri/target/release/bundle/dmg -type f 2>/dev/null || echo "No DMG found"
          echo "=== App ==="
          find src-tauri/target/release/bundle/macos -type f -name "*.app" 2>/dev/null || echo "No .app found"
          echo "=== Updater artifacts ==="
          find src-tauri/target/release/bundle -name "*.tar.gz" -o -name "*.sig" 2>/dev/null || echo "No updater artifacts"
          ls -lhR src-tauri/target/release/bundle/ 2>/dev/null | head -50

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Linux Build (x64 AppImage + deb) ────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: "src-tauri -> src-tauri/target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev \
            libarchive-dev pkg-config cmake \
            libssl-dev libayatana-appindicator3-dev

      - name: Set up libewf (Linux — prebuilt or stub)
        run: |
          PREBUILT="libewf-ffi/prebuilt/linux-x64/libewf.a"
          if [ -f "$PREBUILT" ]; then
            PREBUILT_DIR="$(cd libewf-ffi/prebuilt/linux-x64 && pwd)"
            echo "LIBEWF_DIR=$PREBUILT_DIR" >> "$GITHUB_ENV"
            echo "✅ Using pre-built libewf.a ($(ls -lh "$PREBUILT" | awk '{print $5}'))"
          else
            echo "ℹ️  No pre-built libewf — build.rs will use stub.c fallback"
            echo "  (EWF C-library features disabled; pure-Rust EWF reader still works)"
            echo "  Run the 'Pre-build Native Dependencies' workflow (platform: linux) to build it"
          fi

      - name: Verify sevenzip-ffi library
        run: |
          # Check both locations: build/ (macOS-style) and prebuilt/linux-x64/
          if [ -f sevenzip-ffi/prebuilt/linux-x64/lib7z_ffi.a ]; then
            echo "✅ Pre-built lib7z_ffi.a found in prebuilt/linux-x64/ ($(ls -lh sevenzip-ffi/prebuilt/linux-x64/lib7z_ffi.a | awk '{print $5}'))"
          elif [ -f sevenzip-ffi/build/lib7z_ffi.a ]; then
            echo "✅ Pre-built lib7z_ffi.a found in build/ ($(ls -lh sevenzip-ffi/build/lib7z_ffi.a | awk '{print $5}'))"
          else
            echo "ℹ️  No pre-built lib7z_ffi.a — build.rs will use stub.c fallback"
            echo "  (7z archive features will be disabled at runtime)"
            echo "  Run the 'Pre-build Native Dependencies' workflow (platform: linux) to build it"
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Align Tauri plugin versions (NPM ↔ Rust)
        run: |
          echo "Checking for Tauri plugin version mismatches..."
          for plugin in dialog updater process; do
            RUST_VER=$(grep -A1 "name = \"tauri-plugin-${plugin}\"" src-tauri/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)"/\1/')
            NPM_PKG="@tauri-apps/plugin-${plugin}"
            NPM_VER=$(node -e "try{console.log(require('./node_modules/${NPM_PKG}/package.json').version)}catch{console.log('none')}")
            if [ "$NPM_VER" = "none" ]; then
              continue
            fi
            RUST_MINOR="${RUST_VER%.*}"
            NPM_MINOR="${NPM_VER%.*}"
            if [ "$RUST_MINOR" != "$NPM_MINOR" ]; then
              echo "⚠️  Mismatch: tauri-plugin-${plugin} (Rust ${RUST_VER}) vs ${NPM_PKG} (NPM ${NPM_VER})"
              echo "   Updating NPM package to ^${RUST_VER}..."
              npm install "${NPM_PKG}@^${RUST_VER}" --save
            else
              echo "✅ ${plugin}: Rust ${RUST_VER} ↔ NPM ${NPM_VER}"
            fi
          done
          TAURI_RUST=$(grep -A1 'name = "tauri"' src-tauri/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_NPM=$(node -e "console.log(require('./node_modules/@tauri-apps/api/package.json').version)")
          TAURI_RUST_MINOR="${TAURI_RUST%.*}"
          TAURI_NPM_MINOR="${TAURI_NPM%.*}"
          if [ "$TAURI_RUST_MINOR" != "$TAURI_NPM_MINOR" ]; then
            echo "⚠️  Mismatch: tauri (Rust ${TAURI_RUST}) vs @tauri-apps/api (NPM ${TAURI_NPM})"
            echo "   Updating @tauri-apps/api to ^${TAURI_RUST}..."
            npm install "@tauri-apps/api@^${TAURI_RUST}" --save
          else
            echo "✅ tauri core: Rust ${TAURI_RUST} ↔ NPM ${TAURI_NPM}"
          fi

      - name: Build Tauri app (Linux)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "=== AppImage ==="
          find src-tauri/target/release/bundle/appimage -type f 2>/dev/null || echo "No AppImage found"
          echo "=== DEB ==="
          find src-tauri/target/release/bundle/deb -type f 2>/dev/null || echo "No deb found"
          echo "=== Updater artifacts ==="
          find src-tauri/target/release/bundle -name "*.tar.gz" -o -name "*.sig" 2>/dev/null || echo "No updater artifacts"
          ls -lhR src-tauri/target/release/bundle/ 2>/dev/null | head -50

      - name: Upload Linux installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.tar.gz
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows Build (x64 MSI + EXE) ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: "src-tauri -> src-tauri/target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install LLVM (for bindgen/libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '17'
          directory: 'C:\LLVM'

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-static-compress-libs-v2
          restore-keys: vcpkg-win-x64-static-compress-

      - name: Check for pre-built native libraries
        id: prebuilt
        run: |
          $archivePrebuilt = "patches\libarchive2-sys\prebuilt\windows-x64-msvc\archive.lib"
          $sevenzipPrebuilt = "sevenzip-ffi\build\Release\7z_ffi.lib"
          $libewfPrebuilt = "libewf-ffi\prebuilt\windows-x64-msvc\ewf.lib"

          if (Test-Path $archivePrebuilt) {
            Write-Host "✅ Pre-built archive.lib found"
            $libs = Get-ChildItem "patches\libarchive2-sys\prebuilt\windows-x64-msvc\*.lib"
            foreach ($lib in $libs) {
              Write-Host "  $($lib.Name) ($('{0:N0}' -f ($lib.Length / 1KB)) KB)"
            }
            echo "has_archive=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️  No pre-built archive.lib — will build from source via CMake"
            echo "has_archive=false" >> $env:GITHUB_OUTPUT
          }

          if (Test-Path $sevenzipPrebuilt) {
            Write-Host "✅ Pre-built 7z_ffi.lib found"
            echo "has_sevenzip=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ℹ️  No pre-built 7z_ffi.lib — will use stub.c fallback"
            echo "has_sevenzip=false" >> $env:GITHUB_OUTPUT
          }

          if (Test-Path $libewfPrebuilt) {
            Write-Host "✅ Pre-built ewf.lib found ($('{0:N0}' -f ((Get-Item $libewfPrebuilt).Length / 1KB)) KB)"
            echo "has_libewf=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ℹ️  No pre-built ewf.lib — will use stub.c fallback"
            echo "has_libewf=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Install vcpkg dependencies (fallback — only if no pre-built libs)
        if: steps.prebuilt.outputs.has_archive != 'true'
        run: |
          # Bootstrap vcpkg
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

          # Install compression libraries needed by libarchive (built from source)
          # and libewf. We do NOT install vcpkg's pre-built libarchive package
          # because it includes OpenSSL as a dependency, and its archive.lib
          # (compiled with OpenSSL) conflicts with our CMake-built archive.lib
          # (compiled without OpenSSL), causing LNK2019 unresolved externals
          # for EVP_* symbols.
          C:\vcpkg\vcpkg.exe install zlib:x64-windows-static bzip2:x64-windows-static liblzma:x64-windows-static zstd:x64-windows-static lz4:x64-windows-static

          # Set environment for build scripts
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_INSTALLATION_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV

          # vcpkg paths for compression library linking
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows-static"
          echo "LIBARCHIVE_LIB_DIR=$vcpkgRoot\lib" >> $env:GITHUB_ENV
          echo "LIBARCHIVE_INCLUDE_DIR=$vcpkgRoot\include" >> $env:GITHUB_ENV

          # pkg-config for any crate that needs it
          echo "PKG_CONFIG_PATH=$vcpkgRoot\lib\pkgconfig" >> $env:GITHUB_ENV

          # LLVM/Clang for bindgen (libarchive2-sys FFI generation)
          echo "LIBCLANG_PATH=C:\LLVM\bin" >> $env:GITHUB_ENV

          # Verify no conflicting archive.lib exists in vcpkg
          if (Test-Path "$vcpkgRoot\lib\archive.lib") {
            Write-Host "⚠️  Removing conflicting vcpkg archive.lib"
            Remove-Item "$vcpkgRoot\lib\archive.lib" -Force
          }
          if (Test-Path "$vcpkgRoot\lib\archive_static.lib") {
            Remove-Item "$vcpkgRoot\lib\archive_static.lib" -Force
          }

          Write-Host "✅ vcpkg compression libraries installed"
          Get-ChildItem "$vcpkgRoot\lib\*.lib" | ForEach-Object { Write-Host "  $($_.Name)" }

        shell: pwsh

      - name: Set LIBCLANG_PATH (for bindgen)
        if: steps.prebuilt.outputs.has_archive == 'true'
        run: |
          echo "LIBCLANG_PATH=C:\LLVM\bin" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set up pre-built libewf (Windows)
        if: steps.prebuilt.outputs.has_libewf == 'true'
        run: |
          $prebuiltDir = "$env:GITHUB_WORKSPACE\libewf-ffi\prebuilt\windows-x64-msvc"
          echo "LIBEWF_DIR=$prebuiltDir" >> $env:GITHUB_ENV
          Write-Host "✅ LIBEWF_DIR set to $prebuiltDir"
          Get-ChildItem "$prebuiltDir\*.lib" | ForEach-Object {
            Write-Host "  $($_.Name) ($('{0:N0}' -f ($_.Length / 1KB)) KB)"
          }
        shell: pwsh

      - name: Verify sevenzip-ffi library (Windows)
        run: |
          # Windows uses stub.c fallback in build.rs when pre-built lib is absent.
          # The stub provides all FFI symbols but returns error codes at runtime.
          if (Test-Path "sevenzip-ffi\build\Release\7z_ffi.lib") {
            Write-Host "✅ Pre-built 7z_ffi.lib found"
          } else {
            Write-Host "ℹ️ No pre-built 7z_ffi.lib — build.rs will use stub.c fallback"
            Write-Host "  (7z archive features will be disabled at runtime)"
          }
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Align Tauri plugin versions (NPM ↔ Rust)
        run: |
          Write-Host "Checking for Tauri plugin version mismatches..."
          $plugins = @("dialog", "updater", "process")
          foreach ($plugin in $plugins) {
            $lockContent = Get-Content "src-tauri\Cargo.lock" -Raw
            if ($lockContent -match "name = `"tauri-plugin-$plugin`"\s*\nversion = `"([^`"]+)`"") {
              $rustVer = $matches[1]
            } else { continue }
            $npmPkg = "@tauri-apps/plugin-$plugin"
            try {
              $npmVer = node -e "console.log(require('./node_modules/$npmPkg/package.json').version)"
            } catch { continue }
            $rustMinor = $rustVer -replace '\.\d+$', ''
            $npmMinor = $npmVer -replace '\.\d+$', ''
            if ($rustMinor -ne $npmMinor) {
              Write-Host "⚠️  Mismatch: tauri-plugin-$plugin (Rust $rustVer) vs $npmPkg (NPM $npmVer)"
              npm install "${npmPkg}@^${rustVer}" --save
            } else {
              Write-Host "✅ ${plugin}: Rust $rustVer ↔ NPM $npmVer"
            }
          }
          # Core tauri
          if ($lockContent -match 'name = "tauri"\s*\nversion = "([^"]+)"') {
            $tauriRust = $matches[1]
            $tauriNpm = node -e "console.log(require('./node_modules/@tauri-apps/api/package.json').version)"
            $trMinor = $tauriRust -replace '\.\d+$', ''
            $tnMinor = $tauriNpm -replace '\.\d+$', ''
            if ($trMinor -ne $tnMinor) {
              Write-Host "⚠️  Mismatch: tauri (Rust $tauriRust) vs @tauri-apps/api (NPM $tauriNpm)"
              npm install "@tauri-apps/api@^${tauriRust}" --save
            } else {
              Write-Host "✅ tauri core: Rust $tauriRust ↔ NPM $tauriNpm"
            }
          }
        shell: pwsh

      - name: Set BINDGEN include paths (only when vcpkg was installed)
        if: steps.prebuilt.outputs.has_archive != 'true'
        run: |
          echo "BINDGEN_EXTRA_CLANG_ARGS=-IC:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build Tauri app (Windows)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi 2>$null
          echo "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe 2>$null
          echo "=== Updater artifacts ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.zip 2>$null
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.sig 2>$null
          echo "=== Binary ==="
          Get-ChildItem src-tauri\target\release\*.exe | Where-Object { $_.Name -like "*core*" -or $_.Name -like "*CORE*" }
        shell: pwsh

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish Release & Generate Update Manifest ──────────────────────────────
  publish-release:
    name: Publish Release
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          TAG="${{ needs.create-release.outputs.tag_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts for manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p artifacts
          # Download .sig files and updater bundles from the draft release
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "$GH_REPO" \
            --pattern "*.sig" \
            --pattern "*.tar.gz" \
            --pattern "*.nsis.zip" \
            --pattern "*.AppImage.tar.gz" \
            --dir artifacts || true
          echo "Downloaded artifacts:"
          ls -la artifacts/

      - name: Generate latest.json update manifest
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read macOS signature
          MAC_SIG=""
          MAC_URL=""
          for f in artifacts/*.app.tar.gz.sig; do
            [ -f "$f" ] && MAC_SIG=$(cat "$f") && break
          done
          for f in artifacts/*.app.tar.gz; do
            [ -f "$f" ] && MAC_URL="${BASE_URL}/$(basename "$f")" && break
          done

          # Read Windows NSIS signature
          WIN_SIG=""
          WIN_URL=""
          for f in artifacts/*.nsis.zip.sig; do
            [ -f "$f" ] && WIN_SIG=$(cat "$f") && break
          done
          for f in artifacts/*.nsis.zip; do
            [ -f "$f" ] && WIN_URL="${BASE_URL}/$(basename "$f")" && break
          done

          # Read Linux AppImage signature
          LINUX_SIG=""
          LINUX_URL=""
          for f in artifacts/*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f") && break
          done
          for f in artifacts/*.AppImage.tar.gz; do
            [ -f "$f" ] && LINUX_URL="${BASE_URL}/$(basename "$f")" && break
          done

          # Build latest.json
          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "CORE-FFX ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
          MANIFEST

          FIRST=true

          if [ -n "$MAC_SIG" ] && [ -n "$MAC_URL" ]; then
            [ "$FIRST" = "false" ] && echo "," >> latest.json
            cat >> latest.json << PLATFORM
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              }
          PLATFORM
            FIRST=false
          fi

          if [ -n "$WIN_SIG" ] && [ -n "$WIN_URL" ]; then
            [ "$FIRST" = "false" ] && echo "," >> latest.json
            cat >> latest.json << PLATFORM
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              }
          PLATFORM
          fi

          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_URL" ]; then
            [ "$FIRST" = "false" ] && echo "," >> latest.json
            cat >> latest.json << PLATFORM
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${LINUX_URL}"
              }
          PLATFORM
          fi

          echo "    }" >> latest.json
          echo "  }" >> latest.json

          # Clean up indentation
          python3 -c "import json,sys; d=json.load(open('latest.json')); json.dump(d,open('latest.json','w'),indent=2)"

          echo "=== Generated latest.json ==="
          cat latest.json

      - name: Upload update manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (un-draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
