name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag_name: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Try to extract section from CHANGELOG.md for this version
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?${VERSION}\]?/,/^## \[?[0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG} of CORE-FFX — Forensic File Explorer"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "CORE-FFX ${{ steps.get_tag.outputs.tag }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS Build (Apple Silicon + Intel Universal) ──────────────────────────
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (libewf + libarchive)
        run: |
          brew install libewf libarchive pkg-config cmake

          # Make libarchive visible to pkg-config (Homebrew keg-only)
          echo "PKG_CONFIG_PATH=$(brew --prefix libarchive)/lib/pkgconfig:$(brew --prefix libewf)/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

          # Make sure linker can find libarchive
          echo "LIBRARY_PATH=$(brew --prefix libarchive)/lib:$(brew --prefix libewf)/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Verify sevenzip-ffi library
        run: |
          if [ -f sevenzip-ffi/build/lib7z_ffi.a ]; then
            echo "✅ Pre-built lib7z_ffi.a found ($(ls -lh sevenzip-ffi/build/lib7z_ffi.a | awk '{print $5}'))"
          else
            echo "::error::lib7z_ffi.a not found at sevenzip-ffi/build/lib7z_ffi.a"
            echo "Build it in the standalone sevenzip-ffi repo and copy to sevenzip-ffi/build/"
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          LIBCLANG_PATH: /Library/Developer/CommandLineTools/usr/lib

      - name: List build artifacts
        run: |
          echo "=== DMG ==="
          find src-tauri/target/release/bundle/dmg -type f 2>/dev/null || echo "No DMG found"
          echo "=== App ==="
          find src-tauri/target/release/bundle/macos -type f -name "*.app" 2>/dev/null || echo "No .app found"
          ls -lhR src-tauri/target/release/bundle/ 2>/dev/null | head -40

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows Build (x64 MSI + EXE) ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install LLVM (for bindgen/libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '17'
          directory: 'C:\LLVM'

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-static-libarchive-zlib-bzip2-v1
          restore-keys: vcpkg-win-x64-static-

      - name: Install vcpkg dependencies (libarchive)
        run: |
          # Bootstrap vcpkg
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

          # Install libarchive (provides archive.h for libarchive2 crate)
          C:\vcpkg\vcpkg.exe install libarchive:x64-windows-static

          # Install zlib + bzip2 (needed by libewf)
          C:\vcpkg\vcpkg.exe install zlib:x64-windows-static bzip2:x64-windows-static

          # Set environment for build scripts
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_INSTALLATION_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV

          # libarchive paths for pkg-config / build scripts
          $archiveRoot = "C:\vcpkg\installed\x64-windows-static"
          echo "LIBARCHIVE_LIB_DIR=$archiveRoot\lib" >> $env:GITHUB_ENV
          echo "LIBARCHIVE_INCLUDE_DIR=$archiveRoot\include" >> $env:GITHUB_ENV

          # pkg-config for any crate that needs it
          echo "PKG_CONFIG_PATH=$archiveRoot\lib\pkgconfig" >> $env:GITHUB_ENV

          # LLVM/Clang for bindgen (libarchive2-sys FFI generation)
          echo "LIBCLANG_PATH=C:\LLVM\bin" >> $env:GITHUB_ENV

        shell: pwsh

      - name: Build libewf from source (Windows)
        run: |
          # Download libewf 20251220 source
          $ewfVersion = "20251220"
          $ewfUrl = "https://github.com/libyal/libewf/releases/download/$ewfVersion/libewf-experimental-$ewfVersion.tar.gz"
          Write-Host "Downloading libewf $ewfVersion..."
          Invoke-WebRequest -Uri $ewfUrl -OutFile "libewf.tar.gz" -MaximumRetryCount 3

          # Extract
          tar xzf libewf.tar.gz
          $ewfSrc = Get-ChildItem -Directory "libewf-*" | Select-Object -First 1

          # Build with CMake using vcpkg dependencies
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows-static"
          $ewfInstall = "C:\libewf"
          mkdir $ewfInstall\lib, $ewfInstall\include 2>$null

          cd $ewfSrc
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DZLIB_LIBRARY="$vcpkgRoot\lib\zlib.lib" `
            -DZLIB_INCLUDE_DIR="$vcpkgRoot\include" `
            -DBZIP2_LIBRARIES="$vcpkgRoot\lib\bz2.lib" `
            -DBZIP2_INCLUDE_DIR="$vcpkgRoot\include" `
            ..
          cmake --build . --config Release

          # Copy built artifacts to LIBEWF_DIR
          Get-ChildItem -Recurse -Filter "ewf*" -Include "*.lib","*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination "$ewfInstall\lib\"
            Write-Host "  Copied: $($_.Name)"
          }
          # Copy headers
          cd ..
          Get-ChildItem -Recurse -Filter "*.h" -Path "include" | ForEach-Object {
            $destDir = "$ewfInstall\include\$($_.Directory.Name)"
            mkdir $destDir 2>$null
            Copy-Item $_.FullName -Destination "$destDir\"
          }

          echo "LIBEWF_DIR=$ewfInstall\lib" >> $env:GITHUB_ENV
          Write-Host "✅ libewf built and installed to $ewfInstall"
        shell: pwsh
        continue-on-error: true

      - name: Verify sevenzip-ffi library (Windows)
        run: |
          # Windows uses stub.c fallback in build.rs when pre-built lib is absent.
          # The stub provides all FFI symbols but returns error codes at runtime.
          if (Test-Path "sevenzip-ffi\build\Release\7z_ffi.lib") {
            Write-Host "✅ Pre-built 7z_ffi.lib found"
          } else {
            Write-Host "ℹ️ No pre-built 7z_ffi.lib — build.rs will use stub.c fallback"
            Write-Host "  (7z archive features will be disabled at runtime)"
          }
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          BINDGEN_EXTRA_CLANG_ARGS: "-IC:\\vcpkg\\installed\\x64-windows-static\\include"

      - name: List build artifacts
        run: |
          echo "=== MSI ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi 2>$null
          echo "=== NSIS ==="
          Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe 2>$null
          echo "=== Binary ==="
          Get-ChildItem src-tauri\target\release\*.exe | Where-Object { $_.Name -like "*core*" -or $_.Name -like "*CORE*" }
        shell: pwsh

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish Release ────────────────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [create-release, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (un-draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
